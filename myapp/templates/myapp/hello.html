{% extends "myapp/base.html" %}

{% block title %}
Hello Page
{% endblock %}

{% block content %}
    {% if name %}
        <h2>안녕하세요, {{ name }}님!</h2>
    {% else %}
        <h2>로그인 해주세요.</h2>
    {% endif %}

    <h3>🍎 과일 리스트</h3>
    <ul>
        {% for fruit in fruits %}
            <li>{{ fruit }}</li>
        {% endfor %}
    </ul>
{% endblock %}
